name: PR Preview with Codespaces

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  create-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Needed to comment on the PR

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Install GitHub CLI
      - name: Install GitHub CLI
        uses: cli/gh-actions@v2

      # 3. Create Codespace for this PR branch
      - name: Create Codespace
        id: create_codespace
        run: |
          echo "Creating codespace for PR branch ${{ github.head_ref }}..."

          RESPONSE=$(gh api \
            -X POST \
            repos/${{ github.repository }}/codespaces \
            -F ref="${{ github.head_ref }}" \
            -F machine="basicLinux" \
            -F devcontainer_path=".devcontainer/devcontainer.json")

          echo "Raw response: $RESPONSE"

          # Extract Codespace ID and Web URL
          ID=$(echo "$RESPONSE" | jq -r '.id')
          URL=$(echo "$RESPONSE" | jq -r '.web_url')

          echo "codespace_id=$ID" >> $GITHUB_OUTPUT
          echo "codespace_url=$URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Post a comment with the Codespace preview link
      - name: Comment Preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: codespace-preview
          message: |
            🚀 **Preview Environment Ready!**

            A Codespace has been created for this PR.  
            You can open it here: [Open Preview Codespace](${{ steps.create_codespace.outputs.codespace_url }})
