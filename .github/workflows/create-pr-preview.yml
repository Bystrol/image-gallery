name: PR Preview with Codespaces

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      codespaces: write
      pull-requests: write
    
    steps:
      - name: Cleanup Codespaces
        run: |
          echo "Cleaning up codespaces for PR #${{ github.event.number }}..."
          
          # List all codespaces for this repository
          CODESPACES=$(gh api repos/${{ github.repository }}/codespaces --jq '.codespaces[] | select(.git_status.ref == "${{ github.head_ref }}") | .name')
          
          # Delete each codespace associated with this PR branch
          for codespace in $CODESPACES; do
            echo "Deleting codespace: $codespace"
            gh api -X DELETE repos/${{ github.repository }}/codespaces/$codespace || echo "Failed to delete $codespace (may already be deleted)"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      codespaces: write
      pull-requests: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup GitHub CLI (gh is pre-installed on GitHub runners)
      - name: Verify GitHub CLI
        run: gh --version

      # 3. Check for existing codespace
      - name: Check existing codespace
        id: check_codespace
        run: |
          echo "Checking for existing codespace for PR branch ${{ github.head_ref }}..."
          
          EXISTING=$(gh api repos/${{ github.repository }}/codespaces --jq '.codespaces[] | select(.git_status.ref == "${{ github.head_ref }}" and .state == "Available") | .web_url' | head -1)
          
          if [ -n "$EXISTING" ]; then
            echo "Found existing codespace: $EXISTING"
            echo "codespace_url=$EXISTING" >> $GITHUB_OUTPUT
            echo "existing=true" >> $GITHUB_OUTPUT
          else
            echo "No existing codespace found"
            echo "existing=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 4. Create new Codespace if none exists
      - name: Create Codespace
        id: create_codespace
        if: steps.check_codespace.outputs.existing == 'false'
        run: |
          echo "Creating codespace for PR branch ${{ github.head_ref }}..."

          # Create codespace with error handling
          if RESPONSE=$(gh api \
            -X POST \
            repos/${{ github.repository }}/codespaces \
            -F ref="${{ github.head_ref }}" \
            -F machine="standardLinux32gb" \
            -F devcontainer_path=".devcontainer/devcontainer.json" \
            -F display_name="PR #${{ github.event.number }} - ${{ github.head_ref }}" 2>&1); then
            
            echo "Codespace creation successful"
            echo "Raw response: $RESPONSE"

            # Extract Codespace ID and Web URL
            ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            URL=$(echo "$RESPONSE" | jq -r '.web_url // empty')
            
            if [ -n "$ID" ] && [ -n "$URL" ] && [ "$ID" != "null" ] && [ "$URL" != "null" ]; then
              echo "codespace_id=$ID" >> $GITHUB_OUTPUT
              echo "codespace_url=$URL" >> $GITHUB_OUTPUT
              echo "creation_successful=true" >> $GITHUB_OUTPUT
            else
              echo "Failed to extract codespace details from response"
              echo "creation_successful=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          else
            echo "Failed to create codespace: $RESPONSE"
            echo "creation_successful=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Post a comment with the Codespace preview link
      - name: Comment Preview URL
        if: always() && (steps.check_codespace.outputs.existing == 'true' || steps.create_codespace.outputs.creation_successful == 'true')
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: codespace-preview
          message: |
            🚀 **Preview Environment Ready!**

            ${{ steps.check_codespace.outputs.existing == 'true' && 'An existing Codespace is available for this PR.' || 'A new Codespace has been created for this PR.' }}
            
            **🔗 [Open Preview Codespace](${{ steps.check_codespace.outputs.codespace_url || steps.create_codespace.outputs.codespace_url }})**
            
            **What's included:**
            - 🎯 Frontend development server (React + Vite) on port 3000
            - ⚡ Backend development server on port 8000
            - 🛠️ Pre-installed dependencies and VS Code extensions
            - ☁️ AWS CLI and GitHub CLI ready to use
            
            The Codespace will be automatically cleaned up when this PR is closed.

      # 6. Handle creation failures
      - name: Comment on failure
        if: failure() && steps.create_codespace.outputs.creation_successful == 'false'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: codespace-preview
          message: |
            ❌ **Preview Environment Creation Failed**
            
            There was an issue creating the Codespace for this PR. This could be due to:
            - Repository limits on concurrent Codespaces
            - Temporary GitHub Codespaces service issues
            - Configuration issues with the devcontainer
            
            Please try again later or contact a maintainer if the issue persists.
