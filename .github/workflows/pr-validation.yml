name: Pull Request Validation

on:
  pull_request:
    branches: [ dev, main ]
    types: [ opened, synchronize, reopened ]

jobs:
  backend-validation:
    name: Validate Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate serverless configuration
        run: npx serverless print
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
      
      - name: Check for syntax errors
        run: node -c src/handlers/uploadImage.js

  frontend-validation:
    name: Validate Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run TypeScript compilation
        run: npx tsc -b --noEmit
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Build frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation]
    if: always()
    
    steps:
      - name: Check validation results
        run: |
          echo "Backend validation: ${{ needs.backend-validation.result }}"
          echo "Frontend validation: ${{ needs.frontend-validation.result }}"
          
          if [[ "${{ needs.backend-validation.result }}" == "failure" || "${{ needs.frontend-validation.result }}" == "failure" ]]; then
            echo "❌ Some validation checks failed"
            exit 1
          else
            echo "✅ All validation checks passed"
          fi
