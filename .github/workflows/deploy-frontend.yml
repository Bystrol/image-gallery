name: Deploy Frontend to GitHub Pages

on:
  pull_request:
    branches: [main, dev]
    paths: ["frontend/**"]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && GITHUB_PAGES_BASE_PATH="/image-gallery/" npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: "./frontend/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        env:
          GITHUB_PAGES_BASE_PATH: "/image-gallery/"

  preview:
    permissions: write-all
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}

      - name: Prepare build artifacts for Pages
        run: |
          # List downloaded files to verify
          ls -la
          # Ensure index.html exists
          if [ ! -f "index.html" ]; then
            echo "❌ Error: index.html not found in build artifacts"
            exit 1
          fi
          echo "✅ Build artifacts prepared successfully"

      - name: Deploy PR Preview
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
          retention-days: 1

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Get repository name and owner
            const repoName = context.repo.repo;
            const owner = context.repo.owner;

            // Create GitHub Pages PR preview URL
            const previewUrl = `https://${owner}.github.io/${repoName}/pr-preview/pr-${context.issue.number}/`;

            const comment = `🔗 **PR Preview**: ${previewUrl}\n\n` +
              `📋 **Changes**: ${pr.title}\n` +
              `🔄 **Commit**: ${context.sha.substring(0, 7)}\n` +
              `⏰ **Expires**: 1 day from now\n\n` +
              `> This preview will be available for 1 day. After that, please recreate the PR to get a fresh preview.`;

            // Check if PR is from a fork
            const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;

            if (isFork) {
              console.log('ℹ️ PR is from a fork - commenting may not work due to permissions');
              console.log('🔗 Preview URL (may not be accessible):', previewUrl);

              // For fork PRs, we can't comment but the preview should still work
              return;
            }

            try {
              // Check if comment already exists
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const existingComment = comments.find(c =>
                c.body.includes('PR Preview') && c.user.type === 'Bot'
              );

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: comment
                });
                console.log('✅ Updated existing PR comment');
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
                console.log('✅ Created new PR comment');
              }
            } catch (error) {
              console.log('⚠️ Error managing PR comment:', error.message);
              console.log('ℹ️ This is expected for fork PRs - the preview should still work');
            }
