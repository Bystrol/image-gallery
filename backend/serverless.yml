service: image-gallery-api

frameworkVersion: '3'

# Load environment variables from .env file
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'eu-north-1'}
  memorySize: 256
  timeout: 30
  
  # Environment variables available to all functions
  environment:
    BUCKET_NAME: ${self:custom.bucketName}
    STAGE: ${self:provider.stage}

  apiGateway:
    binaryMediaTypes:
      - 'multipart/form-data'
      - 'image/*'
      - 'application/octet-stream'
  
  # IAM permissions for Lambda functions
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:GetObject
          Resource: "arn:aws:s3:::${self:custom.bucketName}/*"

# Custom variables for reusability
custom:
  bucketName: image-gallery-${self:provider.stage}-${self:provider.region}
  
  # Serverless offline plugin configuration for local development
  serverless-offline:
    httpPort: 3001
    host: 0.0.0.0

# Lambda functions
functions:
  uploadImage:
    handler: src/handlers/uploadImage.handler
    events:
      - http:
          path: /upload
          method: post
          cors:
            origin: '*'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
            allowCredentials: false

# AWS Resources
resources:
  Resources:
    # S3 Bucket for storing images
    ImageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - GET
                - PUT
                - POST
                - HEAD
              AllowedOrigins:
                - "*"
              MaxAge: 3000

    # Bucket policy to allow public read access to uploaded images
    ImageBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref ImageBucket
        PolicyDocument:
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: "s3:GetObject"
              Resource: !Join
                - ''
                - - !GetAtt ImageBucket.Arn
                  - '/*'

  Outputs:
    BucketName:
      Description: "S3 Bucket name for image storage"
      Value: !Ref ImageBucket
    ApiEndpoint:
      Description: "API Gateway endpoint URL"
      Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/${self:provider.stage}"

# Plugins
plugins:
  - serverless-offline
